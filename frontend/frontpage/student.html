<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="first.css">
</head>
<body>

  
    <header class="header">
        <div class="logo">Student Dashboard</div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Available Jobs</a></li>
                <li><a href="#">My Tests</a></li>
                <li><a href="#">Placement History</a></li>
            </ul>
        </nav>
    </header>

   
    <section class="available-jobs">
        <h3>Available Jobs</h3>
        <table>
            <tr>
                <th>Job Title</th>
                <th>Company</th>
                <th>Apply</th>
            </tr>
            <tr>
                <td>Software Developer</td>
                <td>ABC Corp</td>
                <td><button class="apply-btn" onclick="applyForJob('Software Developer')">Apply Now</button></td>
            </tr>
            <tr>
                <td>Data Analyst</td>
                <td>XYZ Inc.</td>
                <td><button class="apply-btn" onclick="applyForJob('Data Analyst')">Apply Now</button></td>
            </tr>
        </table>
    </section>

    <footer>
        <p>&copy; 2025 Placement Cell. All rights reserved.</p>
    </footer>

    <script src="student.js"></script>
</body>
</html>
